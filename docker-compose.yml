version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: order-app-postgres
    environment:
      POSTGRES_DB: order_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
      
  adminer:
    image: adminer
    container_name: db-adminer
    restart: unless-stopped
    #hostname: db-adminer
    ports:
      - 9080:8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: